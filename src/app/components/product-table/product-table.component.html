<div class="table-responsive">
    <table class="table table-hover">
        <thead class="table-light">
            <tr>
                <th>Código</th>
                <th>Tipo</th>
                <th>Producto</th>
                <th class="text-center">Stock</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let product of products">
                <td><span class="badge bg-secondary">{{ product.code || 'N/A' }}</span></td>
                <td>{{ product.type }}</td>
                <td>{{ product.item }}</td>
                <td class="text-center">
                    <span class="badge" [ngClass]="{
                        'bg-danger': product.stock <= 2,
                        'bg-warning': product.stock > 2 && product.stock <= 5,
                        'bg-success': product.stock > 5
                    }">{{ product.stock }}</span>
                </td>
                <td>
                    <div class="btn-group">
                        <!-- Botón de Ver (disponible para todos) -->
                        <button class="btn btn-sm btn-outline-info" (click)="onView(product)">
                            <i class="fas fa-eye"></i>
                        </button>

                        <!-- Botones de Editar y Eliminar (solo para admin) -->
                        <ng-container *ngIf="isAdmin()">
                            <button class="btn btn-sm btn-outline-primary" (click)="onEdit(product)">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" (click)="onDelete(product)">
                                <i class="fas fa-trash"></i>
                            </button>
                        </ng-container>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
