<div class="codigos-container">
    <h2>Generación de Códigos de Barras</h2>
    <p class="text-muted">Selecciona los productos para generar códigos de barras.</p>

    <!-- Grid de productos (5 por línea) -->
    <div class="products-grid">

        @for (product of products; track product._id) {
        <div class="product-card" [class.selected]="isSelected(product._id || '')"
            (click)="toggleSelection(product._id || '')">

            <div class="product-header">
                <div class="product-status">
                    <span class="status-indicator" [class.selected]="isSelected(product._id || '')"></span>
                    <span class="status-text">{{ isSelected(product._id || '') ? 'Seleccionado' : '' }}</span>
                </div>
                <div class="product-code">{{ product.code }}</div>
            </div>

            <div class="product-name">{{ product.item }}</div>

            <div class="barcode-container">
                <img [src]="barcodePreviews[product._id || '']" alt="Código de barras" />
            </div>

            @if (isSelected(product._id || '')) {
            <div class="quantity-control">
                <label for="qty-{{product._id}}">Cantidad:</label>
                <input type="number" id="qty-{{product._id}}" min="5" [(ngModel)]="selectedProducts[product._id || '']"
                    class="quantity-input" (click)="$event.stopPropagation()" />
            </div>
            }
        </div>
        }
        
    </div>

    <!-- Botones de acción -->
    <div class="actions mt-4">
        <button class="btn btn-success" (click)="generatePDF()" [disabled]="totalSelectedCount() === 0">
            <i class="fas fa-file-pdf me-2"></i>Descargar PDF ({{ totalSelectedCount() }} códigos)
        </button>
    </div>
</div>
