<div class="inventario-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Inventario de Productos</h2>
        <!-- Solo mostrar botón de nuevo producto para admin -->
        @if (userRole === 'admin') {
            <button class="btn btn-primary">
                <i class="fas fa-plus me-2"></i>Nuevo Producto
            </button>
        }
    </div>

    <!-- Estado de carga -->
    <div [hidden]="!isLoading" class="text-center my-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-2">Cargando productos...</p>
    </div>

    <!-- Error -->
    <div [hidden]="!error" class="alert alert-danger">
        <i class="fas fa-exclamation-triangle me-2"></i>
        {{ errorMessage }}
    </div>

    <!-- Tabla de productos - Ahora como componente -->
    <app-product-table [hidden]="isLoading || error || products.length === 0" [products]="products"
        [userRole]="userRole" (viewProduct)="handleViewProduct($event)" (editProduct)="handleEditProduct($event)"
        (deleteProduct)="handleDeleteProduct($event)">
    </app-product-table>

    <!-- Mensaje cuando no hay productos -->
    <div [hidden]="isLoading || error || products.length > 0" class="alert alert-info">
        <i class="fas fa-info-circle me-2"></i>
        No hay productos en el inventario.
        @if (userRole === 'admin') {
            ¡Añade algunos para comenzar!
        } @else {
            Contacta con un administrador para añadir productos.
        }
    </div>
</div>
